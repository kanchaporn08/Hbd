<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎂</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      text-align: center;
      color: #fff;
    }

    .container {
      padding-top: 100px;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 20px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>สุขสันต์วันเกิด 🎉</h1>
    <p>ขอให้มีความสุขมากๆ นะ</p>

    <button onclick="alert('🎂 Happy Birthday! ขอให้เป็นวันที่ดีนะ')">
      กดตรงนี้ 🎁
    </button>
  </div>
</body>
</html>
